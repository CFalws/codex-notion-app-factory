server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 2m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location = /ops {
        return 302 /ops/;
    }

    location /ops/ {
        alias /opt/codex-app-factory/examples/generated_apps/codex-ops-console/web/;
        try_files $uri $uri/ /ops/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    client_max_body_size 2m;

    ssl_certificate /etc/letsencrypt/live/34.40.112.33/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/34.40.112.33/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location = /ops {
        return 302 /ops/;
    }

    location /ops/ {
        alias /opt/codex-app-factory/examples/generated_apps/codex-ops-console/web/;
        try_files $uri $uri/ /ops/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
