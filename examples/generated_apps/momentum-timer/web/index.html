<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Momentum Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Real Notion intake sample</p>
        <h1>Momentum Timer</h1>
        <p class="lede">Get one concrete first move and a live 3-minute start window.</p>
      </section>

      <section class="panel panel--primary">
        <form id="momentum-form" class="momentum-form">
          <label class="label" for="task">What are you trying to start?</label>
          <div class="input-row">
            <input
              id="task"
              name="task"
              type="text"
              maxlength="180"
              placeholder="Clean the room, reply to emails, start studying..."
              autocomplete="off"
              required
            />
            <button type="submit">Start</button>
          </div>
        </form>

        <div id="result-card" class="result-card" hidden>
          <p class="result-label">First action</p>
          <h2 id="result-action"></h2>
          <div class="timer-row">
            <p class="timer-label">Momentum window</p>
            <p id="timer-value" class="timer-value">03:00</p>
          </div>
        </div>
      </section>

      <section class="panel panel--secondary">
        <div class="panel-header">
          <h3>Recent starts</h3>
          <p>Local history only.</p>
        </div>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
