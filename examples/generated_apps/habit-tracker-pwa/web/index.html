<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#177e89" />
    <meta name="description" content="휴대폰에서 습관을 추가하고 빠르게 체크하며 연속 기록을 확인할 수 있도록 만든 모바일 중심 개인 트래커입니다." />
    <title>Habit Tracker PWA</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">설치 가능한 개인 도구</p>
        <h1>Habit Tracker PWA</h1>
        <p class="lede">휴대폰에서 습관을 추가하고 빠르게 체크하며 연속 기록을 확인할 수 있도록 만든 모바일 중심 개인 트래커입니다.</p>
        <button id="install-button" class="install-button" hidden>앱 설치</button>
      </header>

      <section class="panel panel--primary">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">오늘</p>
            <h2>내 습관</h2>
          </div>
          <p id="today-label" class="today-label"></p>
        </div>

        <form id="habit-form" class="habit-form">
          <label class="sr-only" for="habit-name">습관 이름</label>
          <input
            id="habit-name"
            name="habit-name"
            type="text"
            maxlength="60"
            placeholder="추적할 습관을 추가하세요"
            autocomplete="off"
            required
          />
          <button type="submit">추가</button>
        </form>

        <ul id="habit-list" class="habit-list"></ul>
      </section>

      <section class="panel panel--secondary">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">개요</p>
            <h2>진행 현황</h2>
          </div>
        </div>
        <div class="stats">
          <article class="stat-card">
            <p class="stat-label">오늘 완료</p>
            <p id="completed-count" class="stat-value">0</p>
          </article>
          <article class="stat-card">
            <p class="stat-label">최고 연속 기록</p>
            <p id="best-streak" class="stat-value">0</p>
          </article>
        </div>
      </section>
    </main>

    <template id="habit-item-template">
      <li class="habit-item">
        <div class="habit-copy">
          <p class="habit-name"></p>
          <p class="habit-meta"></p>
        </div>
        <div class="habit-actions">
          <button class="check-button" type="button">체크</button>
          <button class="delete-button" type="button" aria-label="습관 삭제">삭제</button>
        </div>
      </li>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
