<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#201915" />
    <meta
      name="description"
      content="상태 유지형 Codex 런타임에 앱 수정 요청을 보내고 작업 상태를 추적하는 운영 콘솔입니다."
    />
    <title>Codex Ops Console</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="kicker">Stateful Runtime</p>
        <h1>Codex Ops Console</h1>
        <p class="lede">
          폰에서 수정 요청을 보내면 서버의 Codex CLI 런타임이 같은 앱 세션으로 이어서 작업합니다.
        </p>
        <button id="install-button" class="install-button" hidden>홈 화면에 추가</button>
      </section>

      <section class="panel">
        <div class="grid two-up">
          <label class="field">
            <span>런타임 URL</span>
            <input id="backend-url" type="url" value="https://34.40.112.33" readonly />
          </label>

          <label class="field">
            <span>API Key</span>
            <input id="api-key" type="password" placeholder="X-API-Key 값을 입력" />
          </label>
        </div>

        <div class="row">
          <label class="field">
            <span>대상 앱</span>
            <select id="app-select"></select>
          </label>
          <button id="refresh-apps" class="secondary">앱 목록 새로고침</button>
        </div>

        <div class="app-card">
          <p class="label">배포 링크</p>
          <p id="selected-app-url" class="app-url">앱을 선택하면 여기에서 바로 열 수 있습니다.</p>
        </div>

        <label class="field">
          <span>요청 제목</span>
          <input id="request-title" type="text" placeholder="예: 오늘 완료 버튼 위치를 엄지손가락 쪽으로 옮겨줘" />
        </label>

        <label class="field">
          <span>요청 내용</span>
          <textarea
            id="request-text"
            rows="8"
            placeholder="어떤 앱을 어떻게 바꾸고, 폰에서 어떻게 확인할지 자연어로 적어주세요."
          ></textarea>
        </label>

        <label class="toggle">
          <input id="auto-open-app" type="checkbox" />
          <span>작업이 끝나면 앱 열기 버튼을 바로 누를 수 있게 유지</span>
        </label>

        <div class="actions">
          <button id="send-request">에이전트 실행</button>
          <button id="open-app" class="secondary">선택한 앱 열기</button>
          <button id="apply-proposal" class="secondary" disabled>제안 적용</button>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>작업 상태</h2>
          <p id="job-meta" class="meta">아직 실행 중인 작업이 없습니다.</p>
        </div>
        <pre id="status-output">고정 런타임에 연결해 앱 목록을 불러오는 중입니다.</pre>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>이번 작업에서 배운 점</h2>
          <p id="learning-meta" class="meta">아직 기록된 학습 로그가 없습니다.</p>
        </div>
        <div id="learning-summary" class="learning-summary">
          <p class="learning-empty">작업이 끝나면 여기에서 설계 판단과 검증 내용을 바로 읽을 수 있습니다.</p>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
